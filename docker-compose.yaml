services:
  9router:
    image: ghcr.io/decolua/9router:latest
    container_name: 9router
    restart: always
    ports:
      - "20128:20128"
    environment:
      - NODE_ENV=production
      - PORT=20128
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
    volumes:
      - 9router_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:20128/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  9router_data: