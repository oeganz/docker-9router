version: '3.8'
services:
  9router:
    image: ghcr.io/decolua/9router:latest
    container_name: 9router
    restart: always
    ports:
      - "20128:20128"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:20128/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  9router_data:
